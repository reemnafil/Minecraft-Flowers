<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC Flowers | Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">MC Flowers ❀</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="flowers.html">Flowers</a></li>
            <li><a href="uses.html">Uses</a></li>
        </ul>
    </nav>

    <div class="back-home-container">
        <a href="index.html" class="nav-btn back-btn">⮜ Back</a>
    </div>

    <section class="container" style="padding-top: 0px;">
        <h2 class="section-title">Flower Collection</h2>
        <div class="flower-grid">
            <div class="card" onclick="showPopup('Cactus Flower', '• Location : Desert\n• Utility : Decoration\n• Dye Color : Pink')">
                <div class="img-container"><img src="cactus.png" alt="Cactus"></div>
                <h3>Cactus Flower</h3>
                <button class="more-btn">More Info</button>
            </div>
            <div class="card" onclick="showPopup('Pink Petals', '• Location : Cherry Grove\n• Stew : Regeneration\n• Dye Color : Pink')">
                <div class="img-container"><img src="pink petals.png" alt="Pink Petals"></div>
                <h3>Pink Petals</h3>
                <button class="more-btn">More Info</button>
            </div>
            <div class="card" onclick="showPopup('Allium', '• Location : Flower Forest\n• Stew : Fire Resistance\n• Dye Color : Magenta')">
                <div class="img-container"><img src="allium.png" alt="Allium"></div>
                <h3>Allium</h3>
                <button class="more-btn">More Info</button>
            </div>
            <div class="card" onclick="showPopup('Dandelion', '• Location : Plains/Forest\n• Stew : Saturation\n• Dye Color : Yellow')">
                <div class="img-container"><img src="dandelion.png" alt="Dandelion"></div>
                <h3>Dandelion</h3>
                <button class="more-btn">More Info</button>
            </div>
            <div class="card" onclick="showPopup('Rose Bush', '• Location : Forest\n• Utility : 2 blocks tall\n• Dye Color : Red')">
                <div class="img-container"><img src="rose bush.png" alt="Rose Bush"></div>
                <h3>Rose Bush</h3>
                <button class="more-btn">More Info</button>
            </div>
        </div>

        <h2 class="section-title" style="margin-top: 60px;"> Rare Discoveries ✿</h2>
        <div class="rare-card" onclick="showPopup('Wither Rose', '• Location : It spawn when wither boss kills any mob\n• Effect : Wither Damage\n• Stew : Wither (Harmful)')">
            <div class="img-container"><img src="wither rose.png" alt="Wither Rose"></div>
            <div class="rare-text">
                <h3>Wither Rose</h3>
                <p>The darkest flower. Used for Black Dye and mob farms.</p>
                <button class="more-btn" style="margin-top: 15px;">More Info</button>
            </div>
        </div>
    </section>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <h2 id="pop-title" style="color: #81c784;"></h2>
            <p id="pop-desc" style="white-space: pre-line; margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
